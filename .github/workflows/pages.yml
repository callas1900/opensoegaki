name: Deploy web app to GitHub Pages

# Deploys on release tags (same trigger as release.yml) so every Pages deploy
# carries a bumped version — which is also what keys the service worker's
# versioned cache (soegaki-v<version>). workflow_dispatch remains as a manual
# escape hatch.
on:
  push:
    tags: ['v*']
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build:web
      # No manual .nojekyll step: actions/deploy-pages below deploys via the
      # Pages API rather than a Jekyll-processed branch, so Jekyll never
      # touches this artifact regardless (and recent versions add their own
      # .nojekyll to the deployment besides).
      - uses: actions/upload-pages-artifact@v4
        with:
          path: dist-web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment

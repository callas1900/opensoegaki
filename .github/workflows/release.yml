name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  verify-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check tag matches Cargo.toml and package.json versions
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          CARGO_VERSION=$(awk -F'"' '/^\[package\]/{p=1} p && /^version[[:space:]]*=/{print $2; exit}' src-tauri/Cargo.toml)
          PACKAGE_VERSION=$(node -p "require('./package.json').version")

          echo "Tag version:     $TAG_VERSION"
          echo "Cargo.toml:       $CARGO_VERSION"
          echo "package.json:     $PACKAGE_VERSION"

          if [ "$TAG_VERSION" != "$CARGO_VERSION" ] || [ "$TAG_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "::error::Version mismatch: tag=$TAG_VERSION cargo=$CARGO_VERSION package=$PACKAGE_VERSION. All three must match before tagging a release."
            exit 1
          fi

  # Creates a single draft GitHub Release before either platform builds, so
  # both matrix legs upload assets to the *same* release instead of each
  # calling tauri-action with its own tagName/releaseDraft and racing to
  # create (or duplicate) the release themselves.
  create-release:
    needs: verify-version
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create_release.outputs.release_id }}
    steps:
      - uses: actions/github-script@v7
        id: create_release
        with:
          script: |
            const tag = process.env.GITHUB_REF_NAME;
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `OpenSoegaki ${tag}`,
              draft: true,
              prerelease: false,
            });
            core.setOutput('release_id', data.id);

  release:
    needs: create-release
    uses: ./.github/workflows/_build.yml
    with:
      release-id: ${{ needs.create-release.outputs.release_id }}
    secrets: inherit

  # Both platform builds succeeded and uploaded their assets to the draft
  # release created above; flip it to published so the tag-push flow remains
  # fully automatic with no manual step.
  publish-release:
    needs: [create-release, release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: Number('${{ needs.create-release.outputs.release_id }}'),
              draft: false,
            });

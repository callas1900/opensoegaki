name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm check
      - run: pnpm test

  rust:
    runs-on: windows-latest # primary target platform
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: fmt
        run: cargo fmt --check
        working-directory: src-tauri
      - name: clippy
        run: cargo clippy -- -D warnings
        working-directory: src-tauri
      - name: test
        run: cargo test
        working-directory: src-tauri

  # Compile-coverage only for the cfg(target_os = "macos") branch in
  # src-tauri/src/permission.rs (the `rust` job above runs windows-latest
  # only, so that branch is otherwise never compiled until release time).
  # cargo check doesn't need the frontend built: tauri-build only validates
  # `frontendDist` when the `custom-protocol` feature is enabled (the
  # production-bundle path via `tauri build`), which this project's `tauri`
  # dependency does not enable.
  rust-macos-check:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: check
        run: cargo check
        working-directory: src-tauri

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenSoegaki</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <div id="app">
      <header id="toolbar">
        <button id="capture" title="Capture full screen">⛶</button>
        <span class="sep"></span>
        <button data-tool="select" class="tool" title="Select (V)">⬚</button>
        <button data-tool="arrow" class="tool active" title="Arrow (A)">➤</button>
        <button data-tool="rect" class="tool" title="Rectangle (R)">▭</button>
        <button data-tool="text" class="tool" title="Text (T)">T</button>
        <span class="sep"></span>
        <button id="undo" title="Undo (Ctrl+Z)">↩</button>
        <button id="redo" title="Redo (Ctrl+Shift+Z)">↪</button>
        <span class="sep"></span>
        <div id="palette"></div>
        <span class="sep"></span>
        <div id="sizes">
          <button data-size="S" title="Small">S</button>
          <button data-size="M" class="active" title="Medium">M</button>
          <button data-size="L" title="Large">L</button>
        </div>
      </header>
      <main id="stage">
        <canvas id="canvas"></canvas>
        <p id="empty-hint">Press <kbd>Ctrl+V</kbd> to paste a screenshot, or click <strong>Capture</strong> for the full screen.</p>
      </main>
      <footer id="share-bar">
        <div id="drag-tab" title="Drag me into another app to share as PNG">⇱ drag to share</div>
        <div id="share-actions">
          <button id="copy" title="Copy PNG to clipboard (Ctrl+C)">Copy</button>
          <button id="save" title="Save PNG (Ctrl+S)">Save</button>
        </div>
      </footer>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
